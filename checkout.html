<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanHub - Checkout</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="brand-logo">UrbanHub</a>
        </div>
        <div class="nav-right" style="gap: 1rem; color: var(--color-muted); font-size: 0.85rem; font-weight: 500;">
            <i class="ph ph-lock-key"></i> Secure Encrypted Checkout
        </div>
    </nav>

    <main class="checkout-page">
        <section class="container">
            <div id="checkout-error" style="display: none; text-align: center; padding: 4rem 0;">
                <h2>No Product Selected</h2>
                <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Back to Shop</a>
            </div>

            <div class="checkout-grid" id="checkout-container" style="display: none;">
                <!-- Left: Form -->
                <div class="checkout-form">
                    <h2 class="checkout-heading">Billing Details</h2>
                    <form id="checkout-form-submit">
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" placeholder="Sarah" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" placeholder="Jenkins" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="sarah@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Shipping Address</label>
                            <input type="text" placeholder="123 Architecture Lane" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" placeholder="New York" required>
                            </div>
                            <div class="form-group">
                                <label>Zip / Postal Code</label>
                                <input type="text" placeholder="10001" required>
                            </div>
                        </div>

                        <h2 class="checkout-heading" style="margin-top: 3rem;">Payment Information</h2>
                        <div class="payment-box">
                            <div class="form-group">
                                <label>Card Number</label>
                                <div class="card-input-wrap">
                                    <i class="ph ph-credit-card"></i>
                                    <input type="text" placeholder="0000 0000 0000 0000" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Expiry Date</label>
                                    <input type="text" placeholder="MM/YY" required>
                                </div>
                                <div class="form-group">
                                    <label>CVC</label>
                                    <input type="password" placeholder="***" required>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 2rem; width: 100%;">Complete Purchase</button>
                    </form>
                </div>

                <!-- Right: Summary -->
                <div class="checkout-summary">
                    <h2 class="checkout-heading">Order Summary</h2>
                    <div class="summary-card">
                        <div class="summary-item-block">
                            <div class="summary-img">
                                <img id="co-img" src="" alt="Product">
                            </div>
                            <div class="summary-info">
                                <h4 id="co-title">Product Name</h4>
                                <span class="summary-cat" id="co-cat">Category</span>
                                <span class="summary-price" id="co-price">$0.00</span>
                            </div>
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-totals">
                            <div class="totals-row">
                                <span>Subtotal</span>
                                <span id="co-subtotal">$0.00</span>
                            </div>
                            <div class="totals-row">
                                <span>Shipping (Global Priority)</span>
                                <span>$0.00</span>
                            </div>
                            <div class="totals-row">
                                <span>Taxes</span>
                                <span id="co-tax">$0.00</span>
                            </div>
                            <div class="summary-divider"></div>
                            <div class="totals-row grand-total">
                                <span>Total</span>
                                <span id="co-total">$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { supabase } from './supabase-config.js';
        import { requireAuth, initNavAuth } from './auth-guard.js';

        // Initialise navbar profile icon immediately
        initNavAuth();

        const formatPrice = (p) => `$${parseFloat(p).toLocaleString('en-US', {minimumFractionDigits: 2})}`;

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawProductId = (urlParams.get('id') || urlParams.get('productId') || urlParams.get('product_id') || '').trim();
            const productId = rawProductId && rawProductId !== 'undefined' && rawProductId !== 'null' ? rawProductId : null;
            const qty = parseInt(urlParams.get('qty')) || 1;
            
            if (!productId) {
                document.getElementById('checkout-error').style.display = 'block';
                return;
            }

            // Gating the checkout page: Require the user to be logged in.
            const session = await requireAuth();
            if (!session) return; // 'requireAuth' is handling the redirect

            let productData = null;
            let resolvedProductId = productId;

            const resolveProductIdValue = (row) => row?.id ?? row?.product_id ?? row?.productid ?? null;

            try {
                // 1. Fetch Product
                {
                    const { data, error } = await supabase
                        .from('products')
                        .select('*')
                        .eq('id', productId)
                        .maybeSingle();
                    if (!error && data) {
                        productData = data;
                        resolvedProductId = resolveProductIdValue(productData) || productId;
                    } else if (error) {
                        console.warn('Checkout lookup by id failed; falling back to list scan:', error);
                    }
                }

                if (!productData) {
                    const { data: rows, error: listError } = await supabase
                        .from('products')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(200);
                    if (listError) throw listError;

                    const candidates = ['id', 'product_id', 'productid'];
                    for (const key of candidates) {
                        const found = (rows || []).find(r => {
                            const val = r?.[key];
                            if (val == null) return false;
                            if (String(val) === String(productId)) return true;
                            const n1 = Number(val);
                            const n2 = Number(productId);
                            return Number.isFinite(n1) && Number.isFinite(n2) && n1 === n2;
                        });
                        if (found) {
                            productData = found;
                            resolvedProductId = resolveProductIdValue(productData) || productId;
                            break;
                        }
                    }
                }

                if (productData) {
                    
                    // Populate Summary
                    document.getElementById('co-img').src = productData.img;
                    document.getElementById('co-title').textContent = `${productData.name} (x${qty})`;
                    document.getElementById('co-cat').textContent = productData.category;
                    
                    const subtotal = productData.price * qty;
                    const tax = subtotal * 0.08;
                    const total = subtotal + tax;

                    document.getElementById('co-price').textContent = formatPrice(subtotal);
                    document.getElementById('co-subtotal').textContent = formatPrice(subtotal);
                    document.getElementById('co-tax').textContent = formatPrice(tax);
                    document.getElementById('co-total').textContent = formatPrice(total);

                    document.getElementById('checkout-container').style.display = 'grid';
                } else {
                    document.getElementById('checkout-error').style.display = 'block';
                }
            } catch (error) {
                console.error("Error loading checkout:", error);
                document.getElementById('checkout-error').style.display = 'block';
            }

            // 2. Handle Purchase Submission
            const checkoutForm = document.getElementById('checkout-form-submit');
            checkoutForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!productData) {
                    alert("No product selected.");
                    return;
                }

                const submitBtn = checkoutForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.innerText = "PROCESSING...";

                try {
                    const totalAmount = document.getElementById('co-total').textContent;
                    const firstName = checkoutForm.querySelector('input[placeholder="Sarah"]').value;
                    const lastName = checkoutForm.querySelector('input[placeholder="Jenkins"]').value;
                    const customerName = `${firstName} ${lastName}`.trim() || "Guest";
                    
                    // Save Order
                    const { data: orderRows, error: orderError } = await supabase
                        .from('orders')
                        .insert({
                            userid: session.user.id,
                            customer: customerName,
                            product: productData.name,
                            amount: totalAmount,
                            status: 'pending',
                            type: 'product',
                            productid: resolvedProductId
                        })
                        .select('id')
                        .limit(1);
                    if (orderError) throw orderError;
                    const orderId = orderRows?.[0]?.id;

                    // Save Activity Log
                    const { error: activityError } = await supabase.from('activity').insert({
                        title: 'New Purchase',
                        desc: `'${productData.name}' was purchased by ${customerName}.`,
                        time: 'Just now',
                        color: 'green'
                    });
                    if (activityError) throw activityError;

                    alert(`Success! Your order has been placed. Order ID: ${orderId || 'created'}`);
                    window.location.href = 'index.html';

                } catch (error) {
                    console.error("Checkout Error:", error);
                    alert("Something went wrong with your purchase. Please try again.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Complete Purchase";
                }
            });
        });
    </script>
</body>
</html>
